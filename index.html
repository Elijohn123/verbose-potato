<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verbose - Meaning</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            text-align: left;
        }

        h1 {
            margin-top: 0;
            font-size: 32px;
            color: #222;
        }

        .pronunciation {
            color: #666;
            font-style: italic;
            margin-bottom: 20px;
        }

        .definition {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .example {
            background: #eef2f7;
            padding: 15px;
            border-left: 4px solid #4a90e2;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Verbose</h1>
        <div class="pronunciation">/vərˈboʊs/</div>
        <div class="definition">
            <strong>Definition:</strong> Using more words than necessary; overly wordy or long-winded in speech or writing.
        </div>
        <div class="example">
            <strong>Example:</strong> The professor was so verbose that a simple explanation took an entire hour.
        </div>
    </div>
</body>
</html>
